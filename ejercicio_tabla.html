<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ranking de Juegos</title>
  <style>
    table {
      border-collapse: collapse;
      width: 700px;
      margin: auto;
      font-family: Arial;
    }

    th, td {
      border: 1px solid black;
      padding: 10px;
      text-align: center;
    }

    thead {
      background-color: #222;
      color: white;
    }

    tbody tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tfoot {
      background-color: #444;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h2 style="text-align:center;">🎮 Ranking de Juegos</h2>

<table>
  <thead>
    <tr>
      <th colspan="6">Juegos Más Jugados</th>

    <tr>
      <th>Género</th>
      <th>Juego</th>
      <th>Jugadores</th>
      <th>Partidas</th>
      <th>Puntos</th>
      <th>Estado</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td rowspan="2">Acción</td>
      <td>free fire</td>
      <td>1200</td>
      <td>300</td>
      <td>980</td>
      <td>Activo</td>
    </tr>
    <tr>
      <td>Fornite</td>
      <td>950</td>
      <td>250</td>
      <td>870</td>

    </tr>

    <tr>
      <td rowspan="2">Aventura</td>
      <td>tom</td>
      <td>800</td>

  </tbody>

  <tfoot>
    <tr>
      <td colspan="6">Juego más popular: free fire| Total juegos: 4</td>
    </tr>
  </tfoot>
</table>

</body>
</html>
